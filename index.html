<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="description" content="روابط أبو علي في صفحة واحدة." />
  <title>أبو علي | روابط التواصل</title>

  <link rel="icon" type="image/x-icon" href="assets/friend.jpeg" />
  <link rel="apple-touch-icon" href="assets/friend.jpeg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <div class="intro" id="intro" aria-hidden="true">
    <div class="intro-card">
      <span class="intro-kicker">OPENING</span>
      <strong>ABO ALI</strong>
      <span class="intro-line"></span>
    </div>
  </div>

  <div class="background" aria-hidden="true">
    <span class="beam beam-1"></span>
    <span class="beam beam-2"></span>
    <span class="soft-grid"></span>
    <span class="vignette"></span>
  </div>

  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

  <main class="app-shell">
    <section class="hero reveal">
      <button class="avatar-btn" id="profileShot" aria-label="صورة أبو علي">
        <img src="assets/friend.jpeg" alt="أبو علي" />
        <span class="avatar-orbit"></span>
      </button>

      <div class="hero-card glass tilt-card">
        <div class="hero-mini-row">
          <span class="live-dot"></span>
          <span>ABO ALI</span>
        </div>
        <h1>Mohammad Ali</h1>
        <div class="status-pill">BUSY</div>
      </div>
    </section>

    <section class="section reveal" aria-labelledby="socialTitle">
      <div class="section-top compact">
        <h2 id="socialTitle">مواقع التواصل</h2>
        <span class="tiny-hint">اضغط مطولًا للنسخ</span>
      </div>

      <div class="social-stack">
        <a class="social-card glass tilt-card" href="https://tiktok.com/@mz6_xy" data-link="https://tiktok.com/@mz6_xy" aria-label="TikTok">
          <span class="social-icon tiktok"><i class="fa-brands fa-tiktok"></i></span>
          <span class="social-info">
            <strong>TikTok</strong>
            <small>『 𝓜.🫅🏻』</small>
          </span>
          <span class="open-dot"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
        </a>

        <a class="social-card glass tilt-card" href="https://www.snapchat.com/add/mz6_x1?share_id=v-xxG1Q-Ixs&locale=en-US" data-link="https://www.snapchat.com/add/mz6_x1?share_id=v-xxG1Q-Ixs&locale=en-US" aria-label="Snapchat">
          <span class="social-icon snapchat"><i class="fa-brands fa-snapchat"></i></span>
          <span class="social-info">
            <strong>Snapchat</strong>
            <small>mz6_x1</small>
          </span>
          <span class="open-dot"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
        </a>

        <a class="social-card glass tilt-card" href="https://wa.me/970569894556" data-link="https://wa.me/970569894556" aria-label="WhatsApp">
          <span class="social-icon whatsapp"><i class="fa-brands fa-whatsapp"></i></span>
          <span class="social-info">
            <strong>WhatsApp</strong>
            <small>Abo Ali</small>
          </span>
          <span class="open-dot"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
        </a>

        <a class="social-card glass tilt-card" href="https://www.instagram.com/mz6_xr" data-link="https://www.instagram.com/mz6_xr" aria-label="Instagram">
          <span class="social-icon instagram"><i class="fa-brands fa-instagram"></i></span>
          <span class="social-info">
            <strong>Instagram</strong>
            <small>@mz6_xr</small>
          </span>
          <span class="open-dot"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
        </a>

        <a class="social-card glass tilt-card" href="https://www.facebook.com/abu.ali.aljabari" data-link="https://www.facebook.com/abu.ali.aljabari" aria-label="Facebook">
          <span class="social-icon facebook"><i class="fa-brands fa-facebook-f"></i></span>
          <span class="social-info">
            <strong>Facebook</strong>
            <small>Abu Ali Aljabari</small>
          </span>
          <span class="open-dot"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
        </a>
      </div>
    </section>

    <section class="section reveal" aria-labelledby="copyTitle">
      <div class="section-top">
        <h2 id="copyTitle">نسخ سريع</h2>
      </div>

      <div class="copy-list">
        <article class="copy-item glass tilt-card">
          <span>
            <small>Epic Games</small>
            <strong>10MD9</strong>
          </span>
          <button class="copy-btn" type="button" data-copy="10MD9" data-name="Epic Games">
            <i class="fa-regular fa-copy"></i>
          </button>
        </article>

        <article class="copy-item glass tilt-card">
          <span>
            <small>Roblox</small>
            <strong>MZ6_x</strong>
          </span>
          <button class="copy-btn" type="button" data-copy="MZ6_x" data-name="Roblox">
            <i class="fa-regular fa-copy"></i>
          </button>
        </article>

        <article class="copy-item glass tilt-card">
          <span>
            <small>Discord</small>
            <strong>mohamadali0777</strong>
          </span>
          <button class="copy-btn" type="button" data-copy="mohamadali0777" data-name="Discord">
            <i class="fa-regular fa-copy"></i>
          </button>
        </article>
      </div>
    </section>

    <section class="designer-section reveal" aria-label="بطاقة المبرمج">
      <article class="designer-card glass tilt-card" id="designerCard">
        <span class="designer-shine"></span>
        <div class="designer-head">
          <button class="designer-avatar" id="sigAvatar" aria-label="صورة المبرمج">
            <img src="assets/me.jpeg" alt="Omar" />
          </button>
          <div>
            <span class="designer-label">مبرمج الموقع</span>
            <h2>Omar</h2>
          </div>
        </div>

        <div class="designer-badges">
          <span><i class="fa-solid fa-mobile-screen"></i>تفضل حياك</span>
        </div>

        <div class="designer-actions">
          <a href="https://omar-i9.github.io/omar-i9/" target="_blank" rel="noopener noreferrer">صفحات المبرمج</a>
          <button type="button" class="copy-btn mini" data-copy="https://omar-i9.github.io/omar-i9/" data-name="رابط المبرمج">
            نسخ
          </button>
        </div>
      </article>
    </section>
  </main>

  <button class="share-fab" id="shareFab" type="button" aria-label="مشاركة الصفحة">
    <i class="fa-solid fa-share-nodes"></i>
  </button>

  <div class="share-layer" id="shareLayer" aria-hidden="true">
    <button class="share-backdrop" id="shareBackdrop" type="button" aria-label="إغلاق"></button>
    <section class="share-sheet glass" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
      <span class="sheet-handle"></span>
      <div class="sheet-top">
        <div>
          <small>مشاركة</small>
          <h2 id="shareTitle">رابط الصفحة</h2>
        </div>
        <button class="icon-btn" id="closeShare" type="button" aria-label="إغلاق">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="share-url-box">
        <input id="shareUrlInput" type="text" readonly value="" aria-label="رابط الصفحة" />
        <button id="copyShareUrl" type="button">نسخ</button>
      </div>

      <button class="native-share" id="nativeShare" type="button">
        <i class="fa-solid fa-paper-plane"></i>
        مشاركة مباشرة
      </button>
    </section>
  </div>

  <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
